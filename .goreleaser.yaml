version: 2

project_name: vefr

builds:
  - id: vefr
    main: ./cmd/proxy
    binary: vefr
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - config.example.toml
      - scripts/**
      - docs/**
      - deploy/**

checksum:
  name_template: checksums.txt
